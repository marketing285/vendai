<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080810;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #4a4a6a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(108,99,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    .orb-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 260px;
      height: 260px;
      cursor: pointer;
    }

    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(108,99,255,0.2);
      animation: ring-idle 3s ease-in-out infinite;
    }
    .orb-ring:nth-child(1) { width: 180px; height: 180px; }
    .orb-ring:nth-child(2) { width: 220px; height: 220px; animation-delay: 0.5s; border-color: rgba(108,99,255,0.12); }
    .orb-ring:nth-child(3) { width: 260px; height: 260px; animation-delay: 1s;   border-color: rgba(108,99,255,0.06); }

    @keyframes ring-idle {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.03); opacity: 1; }
    }

    .orb {
      position: relative;
      z-index: 2;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #8b85ff, #4a44cc 60%, #1a1840);
      box-shadow: 0 0 40px rgba(108,99,255,0.4), 0 0 80px rgba(108,99,255,0.15), inset 0 1px 1px rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    body.listening .orb {
      box-shadow: 0 0 60px rgba(108,99,255,0.7), 0 0 120px rgba(108,99,255,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
      transform: scale(1.06);
    }
    body.listening .orb-ring { animation: ring-listen 1s ease-in-out infinite; border-color: rgba(108,99,255,0.45); }
    @keyframes ring-listen { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    body.thinking .orb { animation: orb-think 1.2s ease-in-out infinite; }
    @keyframes orb-think {
      0%, 100% { box-shadow: 0 0 40px rgba(108,99,255,0.4), 0 0 80px rgba(108,99,255,0.15), inset 0 1px 1px rgba(255,255,255,0.15); }
      50%       { box-shadow: 0 0 70px rgba(167,139,250,0.65), 0 0 140px rgba(167,139,250,0.2), inset 0 1px 1px rgba(255,255,255,0.2); }
    }

    body.speaking .orb {
      box-shadow: 0 0 80px rgba(167,139,250,0.8), 0 0 160px rgba(167,139,250,0.3), inset 0 1px 1px rgba(255,255,255,0.25);
    }
    body.speaking .orb-ring { border-color: rgba(167,139,250,0.5); animation-duration: 0.8s; }

    /* Canvas de ondas — ocupa toda a orb-wrap */
    #waveCanvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    body.listening #waveCanvas,
    body.speaking  #waveCanvas { opacity: 1; }

    .status {
      margin-top: 44px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s;
      min-height: 18px;
    }
    body.listening .status { color: var(--accent2); }
    body.thinking  .status { color: var(--accent);  }
    body.speaking  .status { color: var(--accent2); }

    .transcript {
      margin-top: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      max-width: 400px;
      text-align: center;
      font-style: italic;
      min-height: 20px;
      padding: 0 24px;
      transition: opacity 0.3s;
    }

    /* Texto de fallback (só aparece se ElevenLabs falhar) */
    #fallbackText {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 540px;
      width: 90%;
      background: rgba(18,18,30,0.95);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.65;
      color: rgba(255,255,255,0.55);
      display: none;
      text-align: center;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0.4;
    }

    .mute-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: var(--muted);
      font-size: 11px;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .mute-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .mute-btn.muted { border-color: #ef4444; color: #f87171; }
  </style>
</head>
<body>

  <div class="logo">Monitor Ativo de Operações</div>

  <div class="orb-wrap" id="orbWrap" onclick="manualActivate()">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <canvas id="waveCanvas" width="260" height="260"></canvas>
    <div class="orb">M</div>
  </div>

  <div class="status" id="status">Aguardando...</div>
  <div class="transcript" id="transcript"></div>
  <div id="fallbackText"></div>

  <div class="hint">Diga &ldquo;<strong>MAX</strong>&rdquo; para ativar &nbsp;·&nbsp; ou clique no orbe</div>
  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🎤 Ativo</button>

<script src="controller.js"></script>
</body>
</html>
